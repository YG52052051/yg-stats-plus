name: Build Stats App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_NAME: Stats.xcodeproj
  SCHEME_NAME: Stats

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.swift', '**/*.xcodeproj/**') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Build Stats.app
        run: |
          set -o pipefail
          xcodebuild \
            -project $PROJECT_NAME \
            -scheme $SCHEME_NAME \
            -configuration Release \
            -derivedDataPath build \
            clean build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=14.0

      - name: Create distribution package
        run: |
          mkdir -p dist

          # Find and copy the built app
          APP_PATH="build/Build/Products/Release/Stats.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Error: Stats.app not found at $APP_PATH"
            echo "Searching for Stats.app..."
            find build -name "Stats.app" -type d
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" dist/

          # Create ZIP
          cd dist
          zip -ry Stats-macOS-unsigned.zip Stats.app

          echo "Package created:"
          ls -lh Stats-macOS-unsigned.zip
          echo "App contents:"
          ls -la Stats.app/Contents/MacOS/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stats-macOS
          path: dist/Stats-macOS-unsigned.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Stats-macOS
          path: dist

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Stats ${{ steps.version.outputs.VERSION }}
          files: dist/Stats-macOS-unsigned.zip
          body: |
            ## Stats ${{ steps.version.outputs.VERSION }}

            ### Download Instructions
            1. Download `Stats-macOS-unsigned.zip`
            2. Unzip the file
            3. Right-click `Stats.app` → Open (first launch only)

            ### Note
            This is an **unsigned** build. macOS may show a security warning.
            - Go to System Settings → Privacy & Security → Open Anyway
            - Or run: `xattr -cr Stats.app` in Terminal

            ### New Features
            - Process traffic history recording (per-process network usage tracking)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
